<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VillageChef</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Contrail+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assests/css/style.css">
</head>
<body>

<div class="container-fluid">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <!-- LEFT -->
            <a class="navbar-brand" href="#">
                <img src="assests/images/logo.png" class="img-1 img-fluid" alt="Logo">
            </a>

            <!-- TOGGLE BUTTON FOR MOBILE -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- CENTER + RIGHT -->
            <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
                <div class="navbar-nav mx-auto nav-center">
                    <a class="nav-link text-white" href="#">Home</a>
                    <a class="nav-link text-white" href="#">About Us</a>
                    <a class="nav-link text-white" href="#">Menu</a>
                    <a class="nav-link text-white" href="#">Contact</a>
                </div>
                <div class="d-flex align-items-center nav-right">
                    <i class="bi bi-search text-white me-2 me-lg-3"></i>
                    <i class="bi bi-cart text-white me-2 me-lg-3"></i>
                    <button class="btn login-btn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        <span class="d-none d-sm-inline">Login</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <div class="row align-items-center">
        <!-- TEXT -->
        <div class="col-lg-5 col-12 text-lg-start text-center mb-4 mb-lg-0">
            <div class="h-100 d-flex align-items-center justify-content-center">
                <div>
                    <div class="display-2 text-white h-heading text-3">
                        Grab Big Deals on
                        <span>Yummy Meals!</span>
                    </div>

                    <p class="text-white mt-3 ms-lg-4 text-4 px-3 px-lg-0">
                        Lorem ipsum dolor sit amet consectetur. Aenean maurisnam tortor curabitur phasellus.
                    </p>

                    <button class="btn get-btn mt-3 ms-lg-3">Get Started</button>

                    <div class="d-flex align-items-center mt-5 flex-wrap">
                        <div class="position-relative customers me-4">
                            <img src="assests/images/Ellipse 5.png" alt="">
                            <img src="assests/images/Ellipse 6.png" alt="">
                            <img src="assests/images/Ellipse 7.png" alt="">
                        </div>

                        <div class="last-text text-white ms-5">
                            <h6 class="mb-0">Our Happy Customers</h6>
                            <small class="fw-semibold">
                                ⭐ 4.8 <span class="text-secondary">(18.5k Review)</span>
                            </small>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- IMAGE -->
        <div class="col-lg-7 col-md-12 text-center">
            <img src="assests/images/header.png.png" class="img-fluid hero-img" alt="">
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
